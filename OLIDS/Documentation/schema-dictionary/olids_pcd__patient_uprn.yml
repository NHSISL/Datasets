version: 2
sources:
  - name: olids_pcd
    schema: OLIDS_PCD
    tables:
      - name: patient_uprn
        description: 'unique property reference details from address matching of the supplied patient address details'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: '''Unique ID of the patient uprn match'''
            data_type: 'uniqueidentifier'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ID'
            description: 'The organisations record for this person''s registration. Patients may have multiple records across clinical systems and may have registered at an organisation multiple times'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'patient_id'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ADDRESS_ID'
            description: 'reference to the related patient address'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'the organisation that published the record'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'PROVIDER_ORGANISATION_ID'
            description: 'the organisation that initiated the care under which this information was recorded.'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'AUTHOR_ORGANISATION_ID'
            description: 'the organisation that authored the record content'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'UPRN'
            description: '''The matched unique property reference number'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'uprn'
          - name: 'USRN'
            description: '''The matched unique street reference number'''
            data_type: 'varchar(255)'
          - name: 'ORGANISATION_NAME'
            description: '''The organisation name of the address of the UPRN'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'abp_address_organisation'
          - name: 'DEPARTMENT_NAME'
            description: '''The department name of the address of the UPRN'''
            data_type: 'varchar(255)'
          - name: 'SUB_BUILDING_NAME'
            description: '''The sub-building name of the address of the UPRN'''
            data_type: 'varchar(255)'
          - name: 'BUILDING_NAME'
            description: '''The building name of the address of the UPRN'''
            data_type: 'varchar(255)'
          - name: 'BUILDING_NUMBER'
            description: '''The building number of the address of the UPRN'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'abp_address_number'
          - name: 'DEPENDENT_THOROUGHFARE'
            description: '''Added to uniquely distinguish addresses where the same thoroughfare exists twice in the same district'''
            data_type: 'varchar(255)'
          - name: 'THOROUGHFARE'
            description: '''Road or street name'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'abp_address_street'
          - name: 'DOUBLE_DEPENDENT_LOCALITY'
            description: '''A business park, industrial estate or hamlet which is smaller than a Dependent Locality'''
            data_type: 'varchar(255)'
          - name: 'DEPENDENT_LOCALITY'
            description: '''A small town or village name sometimes included in an address when the Delivery Point is outside the boundary of the main Post Town that serves it'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'abp_address_locality'
          - name: 'POST_TOWN'
            description: '''Also known as postal district, the outbound portion of the postcode (i.e. CM3) which denotes a postal distribution centre'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'abp_address_town'
          - name: 'POSTCODE'
            description: '''The postal code used for the Unique Property'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'abp_address_postcode'
          - name: 'ADDRESS_FORMAT_QUALITY'
            description: '''The quality of the input address (i.e. "good")'''
            data_type: 'varchar(255)'
          - name: 'POSTCODE_QUALITY'
            description: '''The quality of the input postcode (i.e. "good")'''
            data_type: 'varchar(255)'
          - name: 'MATCHED_WITH_ASSIGN'
            description: '''True/false - was a match possible'''
            data_type: 'varchar(255)'
          - name: 'QUALIFIER'
            description: '''Type of matched address (residential, child)'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'qualifier'
          - name: 'CLASSIFICATION'
            description: '''<to be confirmed>'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'uprn_property_classification'
          - name: 'ALGORITHM'
            description: '''<to be confirmed>'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'match_rule'
          - name: 'MATCH_PATTERN'
            description: '''<to be confirmed>'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: '''Concatenates match_pattern_flat, building, number and postcode fields'''
          - name: 'UNSTRUCTURED_POSTAL_ADDRESS'
            description: '''The full input address as a string'''
            data_type: 'varchar(255)'
          - name: 'X_COORDINATE'
            description: '''The Ordnance Survey X co-ordinate of the address'''
            data_type: 'float(53)'
            meta:
              compass_equivalent: 'uprn_xcoordinate'
          - name: 'Y_COORDINATE'
            description: '''The Ordnance Survey Y co-ordinate of the address'''
            data_type: 'float(53)'
            meta:
              compass_equivalent: 'uprn_ycoordinate'
          - name: 'LATITUDE'
            description: '''The latitude of the address'''
            data_type: 'float(53)'
            meta:
              compass_equivalent: 'latitude'
          - name: 'LONGITUDE'
            description: '''The longitude of the address'''
            data_type: 'float(53)'
            meta:
              compass_equivalent: 'longitude'
          - name: 'LDS_ID'
            description: '''LDS assigned Unique Identifier for this common modelled record version'''
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: '''Natural or source key for the unique event/entity of the table'''
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: '''LDS assigned identifier for the source dataset'''
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: '''LDS assigned identifier for the process run that transformed the source data into the common modelled item'''
            data_type: 'uniqueidentifier'
          - name: 'LDS_REGISTRAR_EVENT_ID'
            description: '''LDS assigned identifier for the registrar event that processed the record'''
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access'
            data_type: 'varchar(50)'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: '''Date the data was extracted by, received by or supplied to LDS'''
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: '''LDS flag standardised presentation of deleted state of the record.'''
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: '''LDS datetime stamp from which the record version was correct'''
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: '''LDS date stamp when the data was landed into the lakehouse'''
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: '''LDS datetime stamp when the data was updated in the lakehouse'''
            data_type: 'datetime(3)'
