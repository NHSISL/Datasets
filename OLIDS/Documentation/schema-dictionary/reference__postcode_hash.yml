version: 2
sources:
  - name: reference
    schema: REFERENCE
    tables:
      - name: postcode_hash
        description: 'Stores hashed postcodes along with associated organisations and geographic areas for reference, including effective date ranges and LDS audit metadata.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'ID'
            description: 'Unique identifier for the record'
            data_type: 'BINARY(32)'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'POSTCODE_HASH'
            description: 'Unique hashed value representing the postcode, also acts as a unique identifier'
            data_type: 'BINARY(32)'
          - name: 'PRIMARY_CARE_ORGANISATION'
            description: 'Primary care organisation associated with the postcode'
            data_type: 'VARCHAR(9)'
          - name: 'LOCAL_AUTHORITY_ORGANISATION'
            description: 'Local authority organisation linked to the postcode'
            data_type: 'VARCHAR(5)'
          - name: 'YR2011_LSOA'
            description: '2011 Lower Super Output Area (LSOA) code for the postcode'
            data_type: 'VARCHAR(9)'
          - name: 'YR2011_MSOA'
            description: '2011 Middle Super Output Area (MSOA) code for the postcode'
            data_type: 'VARCHAR(9)'
          - name: 'YR2021_LSOA'
            description: '2021 Lower Super Output Area (LSOA) code for the postcode'
            data_type: 'VARCHAR(9)'
          - name: 'YR2021_MSOA'
            description: '2021 Middle Super Output Area (MSOA) code for the postcode'
            data_type: 'VARCHAR(9)'
          - name: 'EFFECTIVE_FROM'
            description: 'Start date/time from which this record is effective'
            data_type: 'TIMESTAMP_NTZ(9)'
          - name: 'EFFECTIVE_TO'
            description: 'End date/time until which this record is effective'
            data_type: 'TIMESTAMP_NTZ(9)'
          - name: 'IS_LATEST'
            description: 'Flag indicating if this is the latest record (1 = yes, 0 = no)'
            data_type: 'NUMBER(38,0) NOT NULL'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATE_TIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LAKEHOUSE_DATE_PROCESSED'
            description: 'Date when the data was landed into the lakehouse'
            data_type: 'DATE NOT NULL'
          - name: 'HIGH_WATERMARK_DATE_TIME'
            description: 'High watermark timestamp for incremental loads'
            data_type: 'TIMESTAMP_NTZ(9) NOT NULL'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
