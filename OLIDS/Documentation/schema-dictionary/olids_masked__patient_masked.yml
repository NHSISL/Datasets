version: 2
sources:
  - name: olids_masked
    schema: OLIDS_MASKED
    tables:
      - name: patient_masked
        description: 'Demographics and other administrative information about an individual or animal receiving care or other health-related services. note that this encompasses an anonymous in context (pseudonymised) representation of patients. Additionally, a single person can exist as many patients undergoing separate episodes of care at differing healthcare provider services. A patient represents a single person undergoing care at one or more specific healthcare providers, typically assigned a local system patient identifier or patient administration system number.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: 'Unique ID of the patient'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'NHS_NUMBER_HASH'
            description: 'internal irreversible hash of the patient NHS number'
            data_type: 'binary(32)'
          - name: 'SK_PATIENT_ID'
            description: 'Consistent LDS pseudonym for secondary care planning purposes'
            data_type: 'int'
          - name: 'LOCAL_PATIENT_ID'
            description: 'local patient administration system identifier for the patient'
            data_type: 'varchar(50)'
          - name: 'TITLE'
            description: '''The title of the patient'''
            data_type: 'varchar(50)'
          - name: 'GENDER_SOURCE_CONCEPT_ID'
            description: '''Reference to the gender of the patient'''
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'the organisation that published the record'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'REGISTERED_PRACTICE_ID'
            description: 'LDS assigned identifier for patient''s registered practice'
            data_type: 'uniqueidentifier'
          - name: 'BIRTH_YEAR'
            description: 'year of the date of birth'
            data_type: 'int'
          - name: 'BIRTH_MONTH'
            description: 'month of the date of birth'
            data_type: 'int'
          - name: 'DEATH_YEAR'
            description: 'year of the date of death'
            data_type: 'int'
          - name: 'DEATH_MONTH'
            description: 'month of the date of death'
            data_type: 'int'
          - name: 'IS_CONFIDENTIAL'
            description: 'true/false - is the observation marked as confidential/sensitive'
            data_type: 'bit'
          - name: 'IS_TEST_PATIENT'
            description: 'true/false - is the patient flagged or denoted as a test patient in the source system'
            data_type: 'bit'
          - name: 'IS_SPINE_SENSITIVE'
            description: 'true/false - is the patient marked as spine sensitive within the source system. **Important note: This column is sourced from local practice systems, and may not reflect values held within the PDS spine service. It is not advised to use this column to inform sensitivity filtering policies.**'
            data_type: 'bit'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'LDS assigned identifier for the process run that conducted interchange protocol conversion of the data from incoming batch into existing held data'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access.'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the data was extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'Date the business id was first witnessed by, received by or supplied to LDS.'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
