version: 2
sources:
  - name: olids_common
    schema: OLIDS_COMMON
    tables:
      - name: medication_statement
        description: 'A record of a medication that is being consumed by a patient. A Medication Statement may indicate that the patient may be taking the medication now or has taken the medication in the past or will be taking the medication in the future. The source of this information can be the patient, significant other (such as a family member or spouse), or a clinician. A common scenario where this information is captured is during the history taking process during a patient visit or stay. The medication information may come from sources such as the patient''s memory, from a prescription bottle, or from a list of medications the patient, clinician or other party maintains.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: 'Unique ID of the medication'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ID'
            description: 'The organisations record for this person''s registration. Patients may have multiple records across clinical systems and may have registered at an organisation multiple times'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'patient_id'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'the organisation that published the record'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'PROVIDER_ORGANISATION_ID'
            description: 'the organisation that initiated the medication statement and has responsibility for its activation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'AUTHOR_ORGANISATION_ID'
            description: 'the organisation that authored the record content'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'ENCOUNTER_ID'
            description: 'Reference to the encounter this medication was recorded in'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'encounter_id'
          - name: 'PRACTITIONER_ID'
            description: 'The clinician the activity is recorded against'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'practitioner_id'
          - name: 'OBSERVATION_ID'
            description: 'Reference to the observation that required the medication order'
            data_type: 'uniqueidentifier'
          - name: 'ALLERGY_INTOLERANCE_ID'
            description: 'Reference to allergy intolerance observations attached to this medication order'
            data_type: 'uniqueidentifier'
          - name: 'DIAGNOSTIC_ORDER_ID'
            description: 'Reference to diagnostic order observations attached to this medication order'
            data_type: 'uniqueidentifier'
          - name: 'REFERRAL_REQUEST_ID'
            description: 'Reference to referral requests attached to this medication order'
            data_type: 'uniqueidentifier'
          - name: 'AUTHORISATION_TYPE_SOURCE_CONCEPT_ID'
            description: 'Reference to the authorisation type'
            data_type: 'int'
            meta:
              compass_equivalent: 'authorisation_type_concept_id'
          - name: 'DATE_PRECISION_SOURCE_CONCEPT_ID'
            description: 'Identifies the precision of the clinical effectiveness date to either year (1) month (2) day (5) minute (12) second (13) millisecond (14)'
            data_type: 'int'
            meta:
              compass_equivalent: 'date_precision_concept_id'
          - name: 'MEDICATION_STATEMENT_SOURCE_CONCEPT_ID'
            description: 'Reference to the clinical coding of the medication provided by the supplier'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'non_core_concept_id'
          - name: 'CLINICAL_EFFECTIVE_DATE_PRECISION_SOURCE_CONCEPT_ID'
            description: 'Identifies the precision of the clinical effectiveness date'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'date_precision_concept_id'
          - name: 'CLINICAL_EFFECTIVE_DATE'
            description: 'The date the medication was clinical relevant'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'clinical_effective_date'
          - name: 'CANCELLATION_DATE'
            description: 'The date the medication was cancelled'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'cancellation_date'
          - name: 'DOSE'
            description: 'Textual description of the dose of the medication'
            data_type: 'varchar(1000)'
            meta:
              compass_equivalent: 'dose'
          - name: 'QUANTITY_VALUE_DESCRIPTION'
            description: 'The value of the medication that was prescribed eg 50'
            data_type: 'varchar(500)'
          - name: 'QUANTITY_VALUE'
            description: 'The value of the medication that was prescribed eg 50'
            data_type: 'float'
            meta:
              compass_equivalent: 'quantity_value'
          - name: 'QUANTITY_UNIT'
            description: 'The unit of the medication that was prescribed eg tablets'
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'quantity_unit'
          - name: 'MEDICATION_NAME'
            description: 'The name of the medication attached to the statement'
            data_type: 'varchar(500)'
          - name: 'BNF_REFERENCE'
            description: 'A reference to the drug in the BNF dictionary'
            data_type: 'varchar(10)'
            meta:
              compass_equivalent: 'bnf_reference'
          - name: 'AGE_AT_EVENT'
            description: 'The age the patient was at the time of this event'
            data_type: 'int'
            meta:
              compass_equivalent: 'age_at_event'
          - name: 'AGE_AT_EVENT_BABY'
            description: 'The age the patient was at the time of this event. Shown in integer/whole years if the patient is one (1) years or older, else shown as a categorised (7001-7007) value representing an age category for babies under 1 years old'
            data_type: 'int'
          - name: 'AGE_AT_EVENT_NEONATE'
            description: 'The age the patient was at the time of this event if less than 28 days, else a calculated value representing an age category'
            data_type: 'int'
          - name: 'ISSUE_METHOD'
            description: 'The issue method of the medication eg hand written'
            data_type: 'varchar(8000)'
            meta:
              compass_equivalent: 'issue_method'
          - name: 'DATE_RECORDED'
            description: 'Date the medication statement was recorded'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'date_recorded'
          - name: 'IS_ACTIVE'
            description: 'Is the record active'
            data_type: 'bit'
          - name: 'IS_CONFIDENTIAL'
            description: 'True/false - is the statement marked as confidential/sensitive'
            data_type: 'bit'
          - name: 'EXPIRY_DATE'
            description: 'Expiry date of drug'
            data_type: 'datetime'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'LDS assigned identifier for the process run that conducted interchange protocol conversion of the data from incoming batch into existing held data'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'Date the business id was first witnessed by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the data was extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
