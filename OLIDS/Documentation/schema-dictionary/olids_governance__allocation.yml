version: 2
sources:
  - name: olids_governance
    schema: OLIDS_GOVERNANCE
    tables:
      - name: allocation
        description: 'Allocation table capturing subscription and subscriber allocation details along with LDS audit metadata.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'ID'
            description: 'Unique business key generated as concatenation of LDSRecordId, SubscriberId, and SubscriptionId'
            data_type: 'uniqueidentifier'
          - name: 'LDS_START_DATE_TIME'
            description: 'Timestamp indicating when this allocation record became active; taken from DateTimeUpdated or DateTimeCreated'
            data_type: 'timestamp'
          - name: 'LDS_RECORD_ID'
            description: 'LDS assigned unique identifier for the record'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS identifier for the source dataset'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_OBJECT_ID'
            description: 'LDS identifier for the specification object within the source dataset'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_FILE_ID'
            description: 'LDS identifier for the source file from which this record was sourced'
            data_type: 'varchar(8000)'
          - name: 'LDS_BATCH_ID'
            description: 'LDS identifier for the batch processing this record'
            data_type: 'varchar(8000)'
          - name: 'LDS_DATETIME_DATA_SUPPLIED'
            description: 'Date and time when the data was supplied to LDS'
            data_type: 'timestamp'
          - name: 'LDS_SUBSCRIBER_ID'
            description: 'Unique identifier for the subscriber'
            data_type: 'varchar(8000)'
          - name: 'LDS_SUBSCRIPTION_ID'
            description: 'Unique identifier for the subscription'
            data_type: 'varchar(8000)'
          - name: 'LDS_SUBSCRIBER_CODE'
            description: 'Subscriber code assigned by the source system'
            data_type: 'varchar(50)'
          - name: 'LDS_SUBSCRIPTION_ENDPOINT_CODE'
            description: 'Subscriber endpoint or subscription endpoint code'
            data_type: 'varchar(50)'
          - name: 'LDS_ALLOCATION_STATE'
            description: 'Status of the allocation, values: ''active'', ''rescinded'', ''expired'''
            data_type: 'varchar(20)'
          - name: 'LDS_CREATED_DATE'
            description: 'Date and time the record was created in LDS'
            data_type: 'timestamp'
          - name: 'LDS_CREATED_BY_RUN_ID'
            description: 'Pipeline run identifier that created the record'
            data_type: 'varchar(8000)'
          - name: 'LDS_UPDATED_DATE'
            description: 'Date and time the record was last updated in LDS'
            data_type: 'timestamp'
          - name: 'LDS_UPDATED_BY_RUN_ID'
            description: 'Pipeline run identifier that last updated the record'
            data_type: 'varchar(8000)'
