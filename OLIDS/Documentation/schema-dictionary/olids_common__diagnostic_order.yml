version: 2
sources:
  - name: olids_common
    schema: OLIDS_COMMON
    tables:
      - name: diagnostic_order
        description: 'A record of a request for service such as diagnostic investigations, treatments, or operations to be performed. This represents an order or proposal or plan to perform a diagnostic or other service on or for a patient. It represents a proposal or plan or order for a service to be performed that would result in a Procedure or Diagnostic Report, which in turn may reference one or more Observations, which summarize the performance of the procedures and associated documentation such as observations, images, findings that are relevant to the treatment/management of the subject. This resource may be used to share relevant information required to support a referral or a transfer of care request from one practitioner or organization to another when a patient is required to be referred to another provider for a consultation /second opinion and/or for short term or longer term management of one or more health issues or problems. The resource allows requesting only a single procedure. If a workflow requires requesting multiple procedures simultaneously, this is done using multiple instances of this resource.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: 'LDS assigned Unique Identifier for the business key of this table (unique allergy intolerance record)'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
            references:
              target_table: 'PERSON'
              target_column: 'ID'
              cardinality_description: 'One PERSON can have none to many DIAGNOSTIC_ORDER items'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ID'
            description: 'The organisations record for this person''s registration. Patients may have multiple records across clinical systems and may have registered at an organisation multiple times'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'patient_id'
            references:
              target_table: 'PATIENT'
              target_column: 'ID'
              cardinality_description: 'One PATIENT can have none to many DIAGNOSTIC_ORDER items'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'ENCOUNTER_ID'
            description: 'Reference to the encounter the observation was recorded at'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'encounter_id'
            references:
              target_table: 'ENCOUNTER'
              target_column: 'ID'
              cardinality_description: 'One ENCOUNTER can have none to many DIAGNOSTIC_ORDER items'
          - name: 'PRACTITIONER_ID'
            description: 'Reference to the practitioner that recorded the order'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'practitioner_id'
            references:
              target_table: 'PRACTITIONER'
              target_column: 'ID'
              cardinality_description: 'One PRACTITIONER can have none to many DIAGNOSTIC_ORDER items'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'Organisation who published the record'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'one ORGANISATION can be a publisher of none to many APPOINTMENT_PRACTITIONER items'
          - name: 'PARENT_OBSERVATION_ID'
            description: 'Reference to the parent observation in a complex observation (e.g., systolic & diastolic BP)'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'parent_observation_id'
            references:
              target_table: 'OBSERVATION'
              target_column: 'ID'
              cardinality_description: 'One OBSERVATION can be a parent to none to many DIAGNOSTIC_ORDER items'
          - name: 'CLINICAL_EFFECTIVE_DATE'
            description: 'The date the diagnostic order was identified by a clinician'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'clinical_effective_date'
          - name: 'CLINCIAL_EFFECTIVE_DATE_PRECISION_SOURCE_CONCEPT_ID'
            description: 'Identifies the precision of the clinical effectiveness date'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'date_precision_concept_id'
          - name: 'RESULT_VALUE'
            description: 'The value of the result of the observation'
            data_type: 'float'
            meta:
              compass_equivalent: 'result_value'
          - name: 'RESULT_MEASUREMENT_UNITS_SOURCE_CONCEPT_ID'
            description: 'Concept ID for the units of the result of the observation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'result_value_units_concept_id'
          - name: 'RESULT_DATE'
            description: 'The date of the result'
            data_type: 'date(0)'
            meta:
              compass_equivalent: 'result_date'
          - name: 'RESULT_TEXT'
            description: 'Any text associated with the result'
            data_type: 'varchar(8000)'
            meta:
              compass_equivalent: 'result_text'
          - name: 'IS_PROBLEM'
            description: 'Whether the observation is marked as a problem'
            data_type: 'bit'
            meta:
              compass_equivalent: 'is_problem'
          - name: 'IS_REVIEW'
            description: 'Whether the observation is a review of an existing problem'
            data_type: 'bit'
            meta:
              compass_equivalent: 'is_review'
          - name: 'PROBLEM_END_DATE'
            description: 'The end date of the problem'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'problem_end_date'
          - name: 'DIAGNOSTIC_ORDER_SOURCE_CONCEPT_ID'
            description: 'Reference to the clinical coding of the result provided by the supplier'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'raw_concept_id'
          - name: 'AGE_AT_EVENT'
            description: 'The age of the patient at the time of the observation'
            data_type: 'int'
            meta:
              compass_equivalent: 'age_at_event'
          - name: 'AGE_AT_EVENT_BABY'
            description: 'The age the patient was at the time of this event; categorised for babies under 1 year'
            data_type: 'int'
            meta:
              compass_equivalent: 'age_at_event_baby'
          - name: 'AGE_AT_EVENT_NEONATE'
            description: 'The age the patient was at the time of this event if less than 28 days'
            data_type: 'int'
            meta:
              compass_equivalent: 'age_at_event_neonate'
          - name: 'EPISODICITY_SOURCE_CONCEPT_ID'
            description: 'Indicates the episodicity of the observation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'episodicity_concept_id'
          - name: 'IS_PRIMARY'
            description: 'Will be false if the observation has a parent observation'
            data_type: 'bit'
            meta:
              compass_equivalent: 'is_primary'
          - name: 'DATE_RECORDED'
            description: 'Date the diagnostic order was recorded in the clinical system'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'date_recorded'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'LDS assigned identifier for the process run that conducted interchange protocol conversion'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'Date the business id was first witnessed by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the data was extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
