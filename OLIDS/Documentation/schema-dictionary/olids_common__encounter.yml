version: 2
sources:
  - name: olids_common
    schema: OLIDS_COMMON
    tables:
      - name: encounter
        description: 'An interaction between a patient and healthcare provider(s) for the purpose of providing healthcare service(s) or assessing the health status of a patient. A patient encounter is further characterized by the setting in which it takes place. Amongst them are ambulatory, emergency, home health, inpatient and virtual encounters. An Encounter encompasses the lifecycle from pre-admission, the actual encounter (for ambulatory encounters), and admission, stay and discharge (for inpatient encounters). During the encounter the patient may move from practitioner to practitioner and location to location.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
            references:
              target_table: 'ALLOCATION'
              target_column: 'LDS_RECORD_ID'
              cardinality_description: 'Each ENCOUNTER can have one to many ALLOCATION instructions (administrative object only)'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: 'Unique ID of the encounter'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
            references:
              target_table: 'PERSON'
              target_column: 'ID'
              cardinality_description: 'One PERSON can have none to many ENCOUNTER items'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ID'
            description: 'The organisations record for this person''s registration. Patients may have multiple records across clinical systems and may have registered at an organisation multiple times'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'patient_id'
            references:
              target_table: 'PATIENT'
              target_column: 'ID'
              cardinality_description: 'One PATIENT can have none to many ENCOUNTER items'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'PRACTITIONER_ID'
            description: 'The clinician the activity is recorded against'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'practitioner_id'
            references:
              target_table: 'PRACTITIONER'
              target_column: 'ID'
              cardinality_description: 'One PRACTITIONER can have none to many ENCOUNTER items'
          - name: 'APPOINTMENT_ID'
            description: 'Reference to the appointment this encounter took part on'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'appointment_id'
            references:
              target_table: 'APPOINTMENT'
              target_column: 'ID'
              cardinality_description: 'One APPOINTMENT can have none to many ENCOUNTER items'
          - name: 'EPISODE_OF_CARE_ID'
            description: 'The episode of care under which this encounter occurred'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'episode_of_care_id'
            references:
              target_table: 'EPISODE_OF_CARE'
              target_column: 'ID'
              cardinality_description: 'One EPISODE_OF_CARE can have none to many ENCOUNTER items'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'Reference to the organisation that published this record'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organisation_id'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'one ORGANISATION can be a publisher of none to many ENCOUNTER items'
          - name: 'PROVIDER_ORGANISATION_ID'
            description: 'Reference to the service provider organisation of the encounter'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'service_provider_organisation_id'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'one organisation can be a provider of none to many ENCOUNTER items'
          - name: 'AUTHOR_ORGANISATION_ID'
            description: 'Reference to the author of the event'
            data_type: 'uniqueidentifier'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'one ORGANISATION can be a publisher of none to many ENCOUNTER items'
          - name: 'CLINICAL_EFFECTIVE_DATE'
            description: 'The date the clinical code is recorded for'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'clinical_effective_date'
          - name: 'CLINICAL_EFFECTIVE_DATE_PRECISION_SOURCE_CONCEPT_ID'
            description: 'Reference to the precision of the date of the encounter'
            data_type: 'int'
            meta:
              compass_equivalent: 'date_precision_concept_id'
            references:
              target_table: 'CONCEPT'
              target_column: 'ID'
              cardinality_description: 'One CONCEPT can be referenced by none to many ENCOUNTER items'
          - name: 'LOCATION'
            description: 'Reference to the location that the encounter took place at'
            data_type: 'varchar(200)'
            meta:
              compass_equivalent: 'institution_location_id'
          - name: 'ENCOUNTER_SOURCE_CONCEPT_ID'
            description: 'Reference to the type of encounter'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'non_core_concept_id'
            references:
              target_table: 'CONCEPT'
              target_column: 'ID'
              cardinality_description: 'One CONCEPT can be referenced by none to many ENCOUNTER items'
          - name: 'AGE_AT_EVENT'
            description: 'The age the patient was when this encounter took place'
            data_type: 'int'
            meta:
              compass_equivalent: 'age_at_event'
          - name: 'AGE_AT_EVENT_BABY'
            description: 'Age in integer years if 1; else categorised for babies under 1 year'
            data_type: 'int'
          - name: 'AGE_AT_EVENT_NEONATE'
            description: 'Age if less than 28 days; null if patient >27 days'
            data_type: 'int'
          - name: 'TYPE'
            description: 'Reference to the type of encounter'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'type'
          - name: 'SUB_TYPE'
            description: 'Reference to the sub-type of the encounter'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'sub_type'
          - name: 'ADMISSION_METHOD'
            description: 'The admission method of the encounter'
            data_type: 'varchar(40)'
            meta:
              compass_equivalent: 'admission_method'
          - name: 'END_DATE'
            description: 'The end date of the encounter'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'end_date'
          - name: 'DATE_RECORDED'
            description: 'The date the encounter was recorded'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'date_recorded'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'LDS assigned identifier for the process run that conducted interchange protocol conversion'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANSIATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the data was extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'Date the business id was first witnessed by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
