version: 2
sources:
  - name: olids_common
    schema: OLIDS_COMMON
    tables:
      - name: appointment
        description: 'A booking of a healthcare event among patient(s), practitioner(s), related person(s) and/or device(s) for a specific date/time. This may result in one or more Encounter(s). Appointment resources are used to provide information about a planned meeting that may be in the future or past. The resource only describes a single meeting, a series of repeating visits would require multiple appointment resources to be created for each instance. Examples include a scheduled surgery, a follow-up for a clinical visit, a scheduled conference call between clinicians to discuss a case (where the patient is a subject, but not a participant), the reservation of a piece of diagnostic equipment for a particular use, etc. The visit scheduled by an appointment may be in person or remote (by phone, video conference, etc.) All that matters is that the time and usage of one or more individuals, locations and/or pieces of equipment is being fully or partially reserved for a designated period of time. This definition takes the concepts of appointments in a clinical setting and also extends them to be relevant in the community healthcare space, and to ease exposure to other appointment / calendar standards widely used outside of healthcare. Users may wish to exclude records which represent unusued or future appointment slots by filtering records where PATIENT_ID and PRACTITIONER_ID are unpopulated, the TYPE is "Default" and the National Slot Category Description is "A planned consultation or routine follow up".'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
            references:
              target_table: 'ALLOCATION'
              target_column: 'LDS_RECORD_ID'
              cardinality_description: 'Each ALLERGY_INTOLERANCE can have one to many ALLOCATION instructions (administrative object only)'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: 'LDS assigned Unique Identifier for the business key of this table (unique allergy intolerance record)'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
            references:
              target_table: 'PERSON'
              target_column: 'ID'
              cardinality_description: 'Each PERSON can have none to many APPOINTMENT items'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ID'
            description: 'The organisations record for this person''s registration. Patients may have multiple records across clinical systems and may have registered at an organisation multiple times'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'patient_id'
            references:
              target_table: 'PATIENT'
              target_column: 'ID'
              cardinality_description: 'One PATIENT can have none to many ALLERGY_INTOLERANCE items'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'Organisation who published the record'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'one ORGANISATION can be a publisher of none to many APPOINTMENT items'
          - name: 'PROVIDER_ORGANISATION_ID'
            description: 'Organisation at which the appointment occured'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'one ORGANISATION can be a provider of none to many APPOINTMENT items'
          - name: 'PRACTITIONER_IN_ROLE_ID'
            description: 'The clinician the activity is recorded against'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'practitioner_id'
            references:
              target_table: 'PRACTITIONER_IN_ROLE'
              target_column: 'ID'
              cardinality_description: 'One PRACTITIONER_IN_ROLE can have none to many APPOINTMENT items'
          - name: 'SCHEDULE_ID'
            description: 'The schedule the patient was put on to book multiple appointments.'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'schedule_id'
            references:
              target_table: 'SCHEDULE'
              target_column: 'ID'
              cardinality_description: 'One SCHEDULE can have none to many APPOINTMENT items'
          - name: 'START_DATE'
            description: 'The start date of the appointment'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'start_date'
          - name: 'PLANNED_DURATION_MINS'
            description: 'The time allocated for the appointment, not necessarily the actual duration (minutes)'
            data_type: 'int'
            meta:
              compass_equivalent: 'planned_duration'
          - name: 'ACTUAL_DURATION_MINS'
            description: 'Time between sent in and left (minutes)'
            data_type: 'int'
            meta:
              compass_equivalent: 'actual_duration'
          - name: 'STATUS_SOURCE_CONCEPT_ID'
            description: 'The status of the appointment e.g. arrived/sent in/left/DNA'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'appointment_status_concept_id'
          - name: 'PATIENT_WAIT_MINS'
            description: 'How long the patient waited from being marked as arrived to being sent in'
            data_type: 'int'
            meta:
              compass_equivalent: 'patient_wait'
          - name: 'PATIENT_DELAY_MINS'
            description: 'How long the patient was delayed for'
            data_type: 'int'
            meta:
              compass_equivalent: 'patient_delay'
          - name: 'DATETIME_BOOKED'
            description: 'Date and time the appointment booking was made'
            data_type: 'datetime(3)'
          - name: 'DATETIME_SENT_IN'
            description: 'Date and time the patient was sent into the practitioner'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'date_time_sent_in'
          - name: 'DATETIME_LEFT'
            description: 'Date and time the patient left the practitioner'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'date_time_left'
          - name: 'CANCELLED_DATE'
            description: 'Date and time the appointment was cancelled (TPP only)'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'cancelled_date'
          - name: 'APPOINTMENT_TYPE'
            description: 'Description of the slot type'
            data_type: 'varchar(100)'
          - name: 'AGE_AT_EVENT'
            description: 'The age the patient was at the time of this event'
            data_type: 'int'
          - name: 'AGE_AT_EVENT_BABY'
            description: 'The age the patient was at the time of this event categorised for babies under 1 year old, see Ages note'
            data_type: 'int'
          - name: 'AGE_AT_EVENT_NEONATE'
            description: 'The age the patient was at the time of this event if less than 28 days. See Ages note'
            data_type: 'int'
          - name: 'BOOKING_METHOD_SOURCE_CONCEPT_ID'
            description: 'Method used to book the appointment'
            data_type: 'uniqueidentifier'
          - name: 'CONTACT_MODE_SOURCE_CONCEPT_ID'
            description: 'Appointment mode of contact - e.g. telephone'
            data_type: 'uniqueidentifier'
          - name: 'IS_BLOCKED'
            description: 'Indicates whether the appointment slot is blocked'
            data_type: 'bit'
          - name: 'NATIONAL_SLOT_CATEGORY_NAME'
            description: 'The name of the national slot category'
            data_type: 'varchar(900)'
          - name: 'CONTEXT_TYPE'
            description: 'The national slot category context type'
            data_type: 'varchar(100)'
          - name: 'SERVICE_SETTING'
            description: 'The national slot category service setting'
            data_type: 'varchar(100)'
          - name: 'NATIONAL_SLOT_CATEGORY_DESCRIPTION'
            description: 'The description of the national slot category'
            data_type: 'varchar(900)'
          - name: 'CSDS_CARE_CONTACT_IDENTIFIER'
            description: 'A link to the commissioning dataset care contact identifier for community services'
            data_type: 'varchar(17)'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'LDS assigned identifier for the process run that converted the data'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the data was extracted or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'Date the business id was first received by LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardising presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
