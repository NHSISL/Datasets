version: 2
sources:
  - name: olids_common
    schema: OLIDS_COMMON
    tables:
      - name: location
        description: 'Details and position information for a place where services are provided and resources and participants may be stored, found, contained, or accommodated. A Location includes both incidental locations (a place which is used for healthcare without prior designation or authorization) and dedicated, formally appointed locations. Locations may be private, public, mobile or fixed and scale from small freezers to full hospital buildings or parking garages.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: 'Unique ID of the location'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'NAME'
            description: 'The name of a location set by the publisher. E.g. ward, clinic, domiciliary'
            data_type: 'varchar(100)'
            meta:
              compass_equivalent: 'name'
          - name: 'LOCATION_TYPE_SOURCE_CONCEPT_ID'
            description: 'The type of location'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'type_code'
          - name: 'TYPE_DESCRIPTION'
            description: 'Textual description of the type of location e.g. GP Practice'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'type_desc'
          - name: 'IS_PRIMARY_LOCATION'
            description: 'True/false - is this the primary location of the parent organisation'
            data_type: 'bit'
          - name: 'HOUSE_NAME'
            description: 'Location property name'
            data_type: 'nvarchar'
          - name: 'HOUSE_NUMBER'
            description: 'Location property number'
            data_type: 'nvarchar'
          - name: 'HOUSE_NAME_FLAT_NUMBER'
            description: 'Location property number'
            data_type: 'nvarchar'
          - name: 'STREET'
            description: 'Location street/road name'
            data_type: 'nvarchar'
          - name: 'ADDRESS_LINE_1'
            description: 'Location address line 1'
            data_type: 'nvarchar'
          - name: 'ADDRESS_LINE_2'
            description: 'Location address line 2'
            data_type: 'nvarchar'
          - name: 'ADDRESS_LINE_3'
            description: 'Location address line 3'
            data_type: 'nvarchar'
          - name: 'ADDRESS_LINE_4'
            description: 'Location address line 4'
            data_type: 'nvarchar'
          - name: 'POSTCODE'
            description: 'Location postcode'
            data_type: 'varchar(200)'
            meta:
              compass_equivalent: 'postcode'
          - name: 'MANAGING_ORGANISATION_ID'
            description: 'Reference to the parent organisation of the location'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'managing_organization_id'
          - name: 'OPEN_DATE'
            description: 'Location opening date'
            data_type: 'date(0)'
          - name: 'CLOSE_DATE'
            description: 'Location closing date (if applicable)'
            data_type: 'date(0)'
          - name: 'IS_OBSOLETE'
            description: 'True/false - is the location closed'
            data_type: 'bit'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'LDS assigned identifier for the process run that conducted interchange protocol conversion'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'Does not exist for this table but included for consistency'
            data_type: 'varchar(50)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'Date the business id was first witnessed by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the data was extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
