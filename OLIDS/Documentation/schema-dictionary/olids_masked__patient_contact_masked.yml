version: 2
sources:
  - name: olids_masked
    schema: OLIDS_MASKED
    tables:
      - name: patient_contact_masked
        description: 'telecommunication contact details for the patient. note that this is the anonymous in context (pseudonymised) edition of the contact information and as a result will merely show the presence of a communication method with no details of the contact itself.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: '''Unique ID of the contact'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ID'
            description: 'The organisations record for this person''s registration. Patients may have multiple records across clinical systems and may have registered at an organisation multiple times'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'patient_id'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'the organisation that published the record'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'PROVIDER_ORGANISATION_ID'
            description: 'the organisation that initiated the care under which this information was recorded.'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'AUTHOR_ORGANISATION_ID'
            description: 'the organisation that authored the record content'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'CONTACT_TYPE'
            description: 'contact type description'
            data_type: 'varchar(255)'
          - name: 'CONTACT_TYPE_CONCEPT_ID'
            description: 'use of contact (e.g. mobile, home, work) (Combines type into single concept)'
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'use_concept_id'
          - name: 'START_DATE'
            description: '''The start date of the contact being valid'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'start_date'
          - name: 'END_DATE'
            description: '''The end date of the contact being valid'''
            data_type: 'varchar(255)'
            meta:
              compass_equivalent: 'end_date'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'LDS assigned identifier for the process run that conducted interchange protocol conversion of the data from incoming batch into existing held data'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access.'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the data was extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'Date the business id was first witnessed by, received by or supplied to LDS.'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record.'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
