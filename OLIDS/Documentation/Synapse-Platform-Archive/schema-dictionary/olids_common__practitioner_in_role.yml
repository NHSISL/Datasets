version: 2
sources:
  - name: olids_common
    schema: OLIDS_COMMON
    tables:
      - name: practitioner_in_role
        description: 'A specific set of Roles/Locations/specialties/services that a practitioner may perform at an organization for a period of time. [!WARNING] TPP records do not relate a source `SRStaffMemberRole` to a specific organisation as record owner. As such these will be listed as owned by the Organisation under which the role occurs. This may later be altered to a static value (to be agreed with users).'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: 'Unique ID of the practitioner role record'
            data_type: 'uniqueidentifier'
          - name: 'PRACTITIONER_ID'
            description: 'Unique ID of the practitioner'
            data_type: 'uniqueidentifier'
          - name: 'EMPLOYER_ORGANISATION_ID'
            description: 'The organisation under which the practitioners role takes place'
            data_type: 'uniqueidentifier'
          - name: 'ROLE_CODE'
            description: 'The role code for the practitioner''s role'
            data_type: 'varchar(5)'
          - name: 'ROLE'
            description: 'The role description for the practitioner''s role'
            data_type: 'varchar(200)'
          - name: 'DATE_EMPLOYMENT_START'
            description: 'Date from which this role was applicable to the practitioner'
            data_type: 'datetime(3)'
          - name: 'DATE_EMPLOYMENT_END'
            description: 'Date from which this role was no longer applicable to the practitioner'
            data_type: 'datetime(3)'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'LDS processing event identifier for sequencing the data'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'Organisation code for the organisation that owns the record'
            data_type: 'varchar(50)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'Date the business id was first witnessed by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the data was extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
