version: 2
sources:
  - name: olids_pcd
    schema: OLIDS_PCD
    tables:
      - name: person
        description: 'harmonised person details extracted from person demographics services (PDS), or presented as a stub of known details where no PDS entry is found.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: '''Unique ID of the person'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'No Foreign Key reference'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PERSON_VERSION_ID'
            description: 'record-version of the person. a subscriber may be limited to a description of a person up to a point in time'
            data_type: 'uniqueidentifier'
          - name: 'PERSON_RECORD_TYPE'
            description: '"STUB" or "PDS" - stub person records are generated from supplied data in advance of a PDS reponse, or where no matched response is recieved .'
            data_type: 'varchar(50)'
          - name: 'MATCHED_NHS_NO'
            description: 'This field needs to be checked for one of the values below. If there is a match with the values below, the record has not been successfully matched. Any other number indicates a match. <br>0000000000: No match was found <br>9999999999: Multiple matches were found. <br><blank>: Not enough fields provided for the trace.'
            data_type: 'varchar(10)'
          - name: 'FAMILY_NAME'
            description: 'Surname, or family name.'
            data_type: 'varchar(40)'
          - name: 'GIVEN_NAME'
            description: 'Forename, or given name.'
            data_type: 'varchar(40)'
          - name: 'OTHER_GIVEN_NAME'
            description: 'Other given, or middle, name.'
            data_type: 'varchar(100)'
          - name: 'GENDER'
            description: 'Gender (sex) of the person, values:<br>0 = Not Known<br>1 = Male<br>2 = Female<br>9 = Not Specified'
            data_type: 'varchar(1)'
          - name: 'BIRTH_DATE'
            description: 'In one of the following formats:<br>full date and time (YYYYMMDDHHMM)<br>full date (YYYYMMDD)<br>year & month (YYYYMM)<br>year only (YYYY)'
            data_type: 'varchar(12)'
          - name: 'BIRTH_YEAR'
            description: 'Birth year of the patient'
            data_type: 'smallint'
            meta:
              compass_equivalent: 'birth_year'
          - name: 'BIRTH_MONTH'
            description: 'Birth month of the patient'
            data_type: 'tinyint'
            meta:
              compass_equivalent: 'birth_month'
          - name: 'BIRTH_DAY'
            description: 'Birth day of the patient'
            data_type: 'smallint'
          - name: 'BIRTH_TIME'
            description: 'Birth time of the patient'
            data_type: 'time(0)'
          - name: 'DEATH_DATE'
            description: 'In one of the following formats:<br>full date and time (YYYYMMDDHHMM)<br>full date (YYYYMMDD)<br>year & month (YYYYMM)<br>year only (YYYY)'
            data_type: 'varchar(12)'
          - name: 'DEATH_YEAR'
            description: 'Death year of the patient'
            data_type: 'smallint'
          - name: 'DEATH_MONTH'
            description: 'Death month of the patient'
            data_type: 'tinyint'
          - name: 'DEATH_DAY'
            description: 'Death day of the patient'
            data_type: 'smallint'
          - name: 'DEATH_TIME'
            description: 'Death time of the patient'
            data_type: 'time(0)'
          - name: 'DEATH_NOTIFICATION_STATUS'
            description: 'Single digit number code, 1 or 2. 1 is Informal death status where death is reported, but unconfirmed. 2 is formal death status, death has been confirmed officially.'
            data_type: 'varchar(1)'
          - name: 'ADDRESS_LINE_1'
            description: 'First line of a person''s usual address.'
            data_type: 'varchar(4000)'
          - name: 'ADDRESS_LINE_2'
            description: 'Second line of a person''s usual address.'
            data_type: 'varchar(4000)'
          - name: 'ADDRESS_LINE_3'
            description: 'Third line of a person''s usual address.'
            data_type: 'varchar(4000)'
          - name: 'ADDRESS_LINE_4'
            description: 'Fourth line of a person''s usual address.'
            data_type: 'varchar(4000)'
          - name: 'ADDRESS_LINE_5'
            description: 'Fifth line of a person''s usual address.'
            data_type: 'varchar(4000)'
          - name: 'POSTCODE'
            description: 'Postcode of the person''s usual address.'
            data_type: 'varchar(8)'
          - name: 'PREFERRED_CONTACT_METHOD'
            description: 'Single digit number code as follows: 1=Letter, 2=Visit, 3=Phone, 4=Email, 5=TextPhone, 6=TextPhoneProxy, 7=Sign language, 8=NoPhone'
            data_type: 'varchar(1)'
          - name: 'NOMINATED_PHARMACY'
            description: 'Code to designate which community pharmacy is used for patient. Composed of double capital letters then 3 numbers, for example FC890'
            data_type: 'varchar(5)'
          - name: 'DISPENSING_DOCTOR'
            description: 'Code to designate which dispensing doctor is used for patient. Composed of first character is a capital letter followed by 5 numbers, for example N85004'
            data_type: 'varchar(6)'
          - name: 'MEDICAL_APPLIANCE_SUPPLIER'
            description: 'Code to designate which medical appliance supplier is used for patient. Composed of triple capital letters followed by 2 numbers, for example FFF14'
            data_type: 'varchar(5)'
          - name: 'GP_PRACTICE_CODE'
            description: 'Primary Care Provider GP practice code.'
            data_type: 'varchar(8)'
          - name: 'GP_REGISTRATION_DATE'
            description: 'Date the patient was registered with a GP.'
            data_type: 'varchar(14)'
          - name: 'NHAIS_POSTING_ID'
            description: 'Unique code that represents the NHAIS box.'
            data_type: 'varchar(3)'
          - name: 'AS_AT_DATE'
            description: 'Ignore this field.'
            data_type: 'varchar(8)'
          - name: 'LOCAL_PATIENT_ID'
            description: 'Ignore this field.'
            data_type: 'varchar(8000)'
          - name: 'INTERNAL_ID'
            description: 'Ignore this field.'
            data_type: 'varchar(8)'
          - name: 'TELEPHONE_NUMBER'
            description: 'Person''s telephone number.'
            data_type: 'varchar(8000)'
          - name: 'MOBILE_NUMBER'
            description: 'Person''s mobile number.'
            data_type: 'varchar(8000)'
          - name: 'EMAIL_ADDRESS'
            description: 'Person''s email address.'
            data_type: 'varchar(8000)'
          - name: 'SENSITIVITY_FLAG'
            description: 'The returned value of the sensitivity of the patient. Note: this value is rarely populated'
            data_type: 'char(1)'
          - name: 'ERROR_SUCCESS_CODE'
            description: 'The code corresponding to this record. <br>See the person level response code table for details.'
            data_type: 'varchar(2)'
          - name: 'MPS_ID'
            description: 'Ignore this field.'
            data_type: 'varchar(10)'
          - name: 'IS_TEST_PATIENT'
            description: 'true/false - is the matched NHS number a known test patient record'
            data_type: 'bit'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED_PERSON'
            description: 'Date the data was extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED_PERSON'
            description: 'Date the business id was first witnessed by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record.'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
