version: 2
sources:
  - name: olids_common
    schema: OLIDS_COMMON
    tables:
      - name: episode_of_care
        description: 'An association between a patient and an organisation / healthcare provider(s) during which time encounters may occur. The managing organisation assumes a level of responsibility for the patient during this time.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: 'Unique ID of the encounter event'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
            references:
              target_table: 'PERSON'
              target_column: 'ID'
              cardinality_description: 'One PERSON can have none to many EPISODE_OF_CARE items'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ID'
            description: 'The organisations record for this person''s registration. Patients may have multiple records across clinical systems and may have registered at an organisation multiple times'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'patient_id'
            references:
              target_table: 'PATIENT'
              target_column: 'ID'
              cardinality_description: 'One PATIENT can have none to many EPISODE_OF_CARE items'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'data controller for the record that supplied this episode of care information. Joins to ORGANISATION.ID'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'One ORGANISATION can publish many EPISODE_OF_CARE events'
          - name: 'MANAGING_ORGANSIATION_ID'
            description: 'organisation at which the episode of care took place / responsible for delivering the care. Joins to ORGANISATION.ID'
            data_type: 'uniqueidentifier'
          - name: 'EPISODE_TYPE_SOURCE_CONCEPT_ID'
            description: 'Reference to the registration type of the patient'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'registration_type_concept_id'
            references:
              target_table: 'CONCEPT'
              target_column: 'ID'
              cardinality_description: 'One CONCEPT can be referenced by none to many EPISODE_OF_CARE items'
          - name: 'EPISODE_STATUS_SOURCE_CONCEPT_ID'
            description: 'Reference to the registration status of the patient'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'registration_status_concept_id'
            references:
              target_table: 'CONCEPT'
              target_column: 'ID'
              cardinality_description: 'One CONCEPT can be referenced by none to many EPISODE_OF_CARE items'
          - name: 'EPISODE_OF_CARE_START_DATE'
            description: 'The date the episode of care started'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'date_registered'
          - name: 'EPISODE_OF_CARE_END_DATE'
            description: 'The date the episode of care ended'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'date_registered_end'
          - name: 'CARE_MANAGER_PRACTITIONER_IN_ROLE_ID'
            description: 'Reference to the usual GP for this episode of care'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'usual_gp_practitioner_id'
          - name: 'LDS_ID'
            description: 'LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Natural or source key for the unique event/entity of the table'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'LDS assigned identifier for the process run that conducted interchange protocol conversion'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'MANAGING_ORGANISATION_CODE'
            description: 'The organisation code of the care provider.'
            data_type: 'varchar(50)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'Date the business id was first witnessed by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the data was extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardised presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the OLIDS record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
