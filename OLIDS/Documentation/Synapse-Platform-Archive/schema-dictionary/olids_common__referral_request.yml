version: 2
sources:
  - name: olids_common
    schema: OLIDS_COMMON
    tables:
      - name: referral_request
        description: 'Used to record and send details about a request for referral service or transfer of a patient to the care of another provider or provider organisation'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: '''Unique ID of the referral request'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ID'
            description: 'The organisations record for this person''s registration. Patients may have multiple records across clinical systems and may have registered at an organisation multiple times'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'patient_id'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'the organisation that published the record'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'AUTHOR_ORGANISATION_ID'
            description: 'the organisation that authored the record content'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'REQUESTER_ORGANISATION_ID'
            description: '''Reference to the organisation that made the referral request'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'requester_organization_id'
          - name: 'RECIPIENT_ORGANISATION_ID'
            description: '''Organisation identifier of the recipient of the referral request'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'recipient_organization_id'
          - name: 'ENCOUNTER_ID'
            description: '''Reference to the encounter the referral was made in'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'encounter_id'
          - name: 'PRACTITIONER_ID'
            description: '''The clinician the activity is recorded against'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'practitioner_id'
          - name: 'UNIQUE_BOOKING_REFERENCE_NUMBER'
            description: '''Unique booking reference number of the referral request'''
            data_type: 'varchar(14)'
          - name: 'CLINICAL_EFFECTIVE_DATE'
            description: '''The date the referral was made'''
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'clinical_effective_date'
          - name: 'CLINICAL_EFFECTIVE_DATE_PRECISION_SOURCE_CONCEPT_ID'
            description: '''Identifies the precision of the clinical effectiveness date to either year (1), month (2), day (5), minute (12), second (13), millisecond (14)'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'date_precision_concept_id'
          - name: 'REFERRAL_REQUEST_PRIORITY_SOURCE_CONCEPT_ID'
            description: '''Reference to the priority of the referral'''
            data_type: 'int'
            meta:
              compass_equivalent: 'referral_request_priority_concept_id'
          - name: 'REFERRAL_REQUEST_TYPE_SOURCE_CONCEPT_ID'
            description: '''Reference to the type of referral request'''
            data_type: 'int'
            meta:
              compass_equivalent: 'referral_request_type_concept_id'
          - name: 'REFERRAL_REQUEST_SPECIALTY_SOURCE_CONCEPT_ID'
            description: '''Reference to the specialty of the referral'''
            data_type: 'int'
            meta:
              compass_equivalent: 'referral_request_specialty_concept_id'
          - name: 'MODE'
            description: '''The mode of the referral'''
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'mode'
          - name: 'IS_OUTGOING_REFERRAL'
            description: '''Whether this is an outgoing referral'''
            data_type: 'bit'
            meta:
              compass_equivalent: 'outgoing_referral'
          - name: 'IS_REVIEW'
            description: '''Whether this referral is a review'''
            data_type: 'bit'
            meta:
              compass_equivalent: 'is_review'
          - name: 'REFERRAL_REQUEST_SOURCE_CONCEPT_ID'
            description: '''The source clinical coding of primary diagnosis provided by the supplier'''
            data_type: 'bigint'
            meta:
              compass_equivalent: 'raw_concept_id'
          - name: 'AGE_AT_EVENT'
            description: '''The age of the patient at the time of the referral'''
            data_type: 'int'
            meta:
              compass_equivalent: 'age_at_event'
          - name: 'AGE_AT_EVENT_BABY'
            description: '''The age the patient was at the time of this event. Shown in integer/whole years if the patient is one (1) years or older, else shown as a categorised (7001-7007) value representing an age category for babies under 1 years old. See [Ages](#ages) for more details.'''
            data_type: 'int'
          - name: 'AGE_AT_EVENT_NEONATE'
            description: '''The age the patient was at the time of this event if less than 28 days, else a calculated value representing an age category'''
            data_type: 'int'
          - name: 'DATE_RECORDED'
            description: '''The date the referral request was added to the source system'''
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'date_recorded'
          - name: 'LDS_ID'
            description: '''LDS assigned Unique Identifier for this common modelled record version'''
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: '''Natural or source key for the unique event/entity of the table'''
            data_type: 'varchar(8000)'
          - name: 'LDS_DATASET_ID'
            description: '''LDS assigned identifier for the source dataset'''
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: '''LDS assigned identifier for the process run that transformed the source data into the common modelled item'''
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: '''LDS processing event identifier for sequencing the data'''
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access'
            data_type: 'varchar(50)'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: '''Date the data was extracted by, received by or supplied to LDS'''
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: '''Date the business id was first witnessed by, received by or supplied to LDS'''
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: '''LDS flag standardised presentation of deleted state of the record.'''
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: '''LDS datetime stamp from which the record version was correct'''
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: '''LDS date stamp when the data was landed into the lakehouse'''
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: '''LDS datetime stamp when the data was updated in the lakehouse'''
            data_type: 'datetime(3)'
