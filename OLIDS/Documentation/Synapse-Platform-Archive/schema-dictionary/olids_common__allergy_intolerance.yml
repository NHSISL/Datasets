version: 2
sources:
  - name: olids_common
    schema: OLIDS_COMMON
    tables:
      - name: allergy_intolerance
        description: 'Risk of harmful or undesirable physiological response which is specific to an individual and associated with exposure to a substance. A record of a clinical assessment of an allergy or intolerance; a propensity, or a potential risk to an individual, to have an adverse reaction on future exposure to the specified substance, or class of substance. Where a propensity is identified, to record information or evidence about a reaction event that is characterised by any harmful or undesirable physiological response that is specific to the individual and triggered by exposure of an individual to the identified substance or class of substance. Substances include, but are not limited to: a therapeutic substance administered correctly at an appropriate dosage for the individual; food; material derived from plants or animals; or venom from insect stings.'
        meta:
          source_markdown: 'OLIDS/Documentation/OLIDS-schema-dictionary.md'
        columns:
          - name: 'LDS_SOURCE_RECORD_ID'
            description: 'LDS assigned Unique Identifier for the source record version'
            data_type: 'uniqueidentifier'
            references:
              target_table: 'ALLOCATION'
              target_column: 'LDS_SOURCE_RECORD_ID'
              cardinality_description: 'each allergy_intolerance can have one to many allocation instructions (administrative object only)'
          - name: 'LDS_SOURCE_RECORD_SHARD_ID'
            description: 'LDS assigned grouping of LDS_SOURCE_RECORD_ID values for join optimisation'
            data_type: 'bigint'
          - name: 'ID'
            description: 'LDS assigned Unique Identifier for the business key of this table (unique allergy intolerance record)'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'id'
          - name: 'PERSON_ID'
            description: 'Unique individual across all organisation'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'person_id'
            references:
              target_table: 'PERSON'
              target_column: 'ID'
              cardinality_description: 'one person can have none to many allergy_intolerance items'
          - name: 'PERSON_SHARD_ID'
            description: 'clustering ID of PERSON_ID'
            data_type: 'bigint'
          - name: 'PATIENT_ID'
            description: 'The organisations record for this person''s registration. Patients may have multiple records across clinical systems and may have registered at an organisation multiple times'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'patient_id'
            references:
              target_table: 'PATIENT'
              target_column: 'ID'
              cardinality_description: 'one patient can have none to many allergy_intolerance items'
          - name: 'PATIENT_SHARD_ID'
            description: 'clustering ID of PATIENT_ID'
            data_type: 'bigint'
          - name: 'PRACTITIONER_ID'
            description: 'The clinician in role that the activity is recorded against'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'practitioner_id'
            references:
              target_table: 'PRACTITIONER'
              target_column: 'ID'
              cardinality_description: 'one practitioner can have none to many allergy_intolerance items'
          - name: 'ENCOUNTER_ID'
            description: 'Reference to the encounter this allergy was record in'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'encounter_id'
            references:
              target_table: 'ENCOUNTER'
              target_column: 'ID'
              cardinality_description: 'one encounter can have none to many allergy_intolerance items'
          - name: 'PUBLISHER_ORGANISATION_ID'
            description: 'Reference to the organisation that published the source record'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'organization_id'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'one organisation can be a publisher of none to many allergy_intolerance items'
          - name: 'PROVIDER_ORGANISATION_ID'
            description: 'Reference to the organisation that provided the care event that recorded this allergy'
            data_type: 'uniqueidentifier'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'one organisation can be a provider of none to many allergy_intolerance items'
          - name: 'AUTHOR_ORGANISATION_ID'
            description: 'Reference to the organisation that authored the source record'
            data_type: 'uniqueidentifier'
            references:
              target_table: 'ORGANISATION'
              target_column: 'ID'
              cardinality_description: 'one organisation can be a publisher of none to many allergy_intolerance items'
          - name: 'CLINICAL_STATUS'
            description: 'unmapped - prepared to match FHIR'
            data_type: 'varchar(20)'
            meta:
              compass_equivalent: 'clinical_status'
          - name: 'VERIFICATION_STATUS'
            description: 'unmapped - prepared to match FHIR'''
            data_type: 'varchar(20)'
          - name: 'CATEGORY'
            description: 'unmapped - prepared to match FHIR'''
            data_type: 'varchar(20)'
          - name: 'CLINICAL_EFFECTIVE_DATE'
            description: 'The date the clinical code is recorded for'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'clinical_effective_date'
          - name: 'CLINICAL_EFFECTIVE_DATE_PRECISION_SOURCE_CONCEPT_ID'
            description: 'Identifies the precision of the clinical effectiveness date'''
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'date_precision_concept_id'
          - name: 'IS_REVIEW'
            description: 'Is this instance of the code a review of a previous encounter'
            data_type: 'bit'
            meta:
              compass_equivalent: 'is_review'
          - name: 'MEDICATION_NAME'
            description: 'Reference to the clinical name of the medication the patient has an allergy to'
            data_type: 'varchar(255)'
          - name: 'MULTI_LEX_ACTION'
            description: ''
            data_type: 'varchar(25)'
          - name: 'ALLERGY_INTOLERANCE_SOURCE_CONCEPT_ID'
            description: 'Reference to the clinical coding of the allergy provided by the supplier'
            data_type: 'uniqueidentifier'
            meta:
              compass_equivalent: 'non_core_concept_id'
            references:
              target_table: 'concept'
              target_column: 'id'
              cardinality_description: 'one concept can appear in none to many allergy_intolerance items'
          - name: 'AGE_AT_EVENT'
            description: 'The age the patient was at the time of this event'
            data_type: 'int'
            meta:
              compass_equivalent: 'age_at_event'
          - name: 'AGE_AT_EVENT_BABY'
            description: 'The age the patient was at the time of this event. NULL if the patient is one (1) years or older, else shown as a categorised (7001-7007) value representing an age category for babies under 1 years old. See [Ages](#ages) for more details.'
            data_type: 'int'
          - name: 'AGE_AT_EVENT_NEONATE'
            description: 'The age the patient was at the time of this event if less than 28 days. NULL where patient is older than 27 days. See [Ages](#ages)'
            data_type: 'int'
          - name: 'DATE_RECORDED'
            description: 'The date the allergy was recorded'
            data_type: 'datetime(3)'
            meta:
              compass_equivalent: 'date_recorded'
          - name: 'IS_CONFIDENTIAL'
            description: 'True/False - is this allergy flagged as a confidential observation'
            data_type: 'bit'
          - name: 'LDS_ID'
            description: 'Audit/debug field: LDS assigned Unique Identifier for this common modelled record version'
            data_type: 'uniqueidentifier'
          - name: 'LDS_BUSINESS_KEY'
            description: 'Audit/debug field: Natural or source key for the unique event/entity of the table (unique allergy intolerance record)'
            data_type: 'varchar(8000)'
          - name: 'LDS_SOURCE_DATASET_ID'
            description: 'Audit/debug field: LDS assigned identifier for the source dataset'
            data_type: 'uniqueidentifier'
          - name: 'LDS_CDM_EVENT_ID'
            description: 'Audit/debug field: LDS assigned identifier for the process run that transformed the source data into the common modelled item'
            data_type: 'uniqueidentifier'
          - name: 'LDS_VERSIONER_EVENT_ID'
            description: 'Audit/debug field: LDS assigned identifier for the process run that conducted interchange protocol conversion of the data from incoming batch into existing held data'
            data_type: 'uniqueidentifier'
          - name: 'PUBLISHER_ORGANISATION_CODE'
            description: 'The organisation code of the publisher / controller of the record governing access'
            data_type: 'varchar(50)'
            meta:
              compass_equivalent: 'organization_id'
          - name: 'LDS_DATETIME_UPDATE_ACQUIRED'
            description: 'Date the source record was last extracted by, received by or supplied to LDS'
            data_type: 'datetime(3)'
          - name: 'LDS_DATETIME_FIRST_ACQUIRED'
            description: 'datetime that the business id value was first witnessed'
            data_type: 'datetime(3)'
          - name: 'LDS_IS_DELETED'
            description: 'LDS flag standardising presentation of deleted state of the record'
            data_type: 'bit'
          - name: 'LDS_START_DATETIME'
            description: 'LDS datetime stamp from which the record version was correct'
            data_type: 'datetime(3)'
          - name: 'LDS_LAKEHOUSE_DATE_PROCESSED'
            description: 'LDS date stamp when the data was landed into the lakehouse'
            data_type: 'date'
          - name: 'LDS_LAKEHOUSE_DATETIME_UPDATED'
            description: 'LDS datetime stamp when the data was updated in the lakehouse'
            data_type: 'datetime(3)'
